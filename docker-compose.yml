services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: price-comparison-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-pricecompare}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-pricecompare_dev_password}
      POSTGRES_DB: ${POSTGRES_DB:-price_comparison}
      POSTGRES_INITDB_ARGS: "--encoding=UTF8 --locale=en_US.UTF-8"
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./scripts/init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-pricecompare} -d ${POSTGRES_DB:-price_comparison}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - price-comparison-network

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: price-comparison-redis
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - price-comparison-network

  # Express.js Backend
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: development
    container_name: price-comparison-backend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-4000}
      
      # Database Configuration (pool reads DB_* — see backend/src/config/database.ts)
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-price_comparison}
      DB_USER: ${POSTGRES_USER:-pricecompare}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-pricecompare_dev_password}
      DATABASE_URL: postgresql://${POSTGRES_USER:-pricecompare}:${POSTGRES_PASSWORD:-pricecompare_dev_password}@postgres:5432/${POSTGRES_DB:-price_comparison}
      
      # Redis Configuration
      REDIS_HOST: redis
      REDIS_PORT: 6379
      REDIS_URL: redis://redis:6379
      
      # JWT Configuration
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_jwt_refresh_secret_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-7d}
      
      # API Configuration
      API_BASE_URL: ${API_BASE_URL:-http://localhost:4000}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      
      # AI Service Configuration (OpenAI/Claude)
      AI_SERVICE_PROVIDER: ${AI_SERVICE_PROVIDER:-openai}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      
      # E-commerce Platform API Keys
      TIKI_API_KEY: ${TIKI_API_KEY:-}
      LAZADA_API_KEY: ${LAZADA_API_KEY:-}
      LAZADA_API_SECRET: ${LAZADA_API_SECRET:-}
      TIKTOK_SHOP_API_KEY: ${TIKTOK_SHOP_API_KEY:-}

      # Rate Limiting
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-900000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-100}
      
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    volumes:
      # Mount source code for hot-reload in development
      - ./backend/src:/app/src:ro
      - ./backend/scripts:/app/scripts:ro
      - ./backend/migrations:/app/migrations:ro
      - ./backend/package.json:/app/package.json:ro
      - ./backend/tsconfig.json:/app/tsconfig.json:ro
      # Named volume for node_modules to avoid conflicts
      - backend_node_modules:/app/node_modules
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - price-comparison-network

  # Next.js Frontend
  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: development
    container_name: price-comparison-frontend
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${FRONTEND_PORT:-3000}
      HOSTNAME: "0.0.0.0"
      
      # API Configuration
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000}
      NEXT_PUBLIC_FRONTEND_URL: ${NEXT_PUBLIC_FRONTEND_URL:-http://localhost:3000}
      # Internal URL for server-side rendering (SSR) inside Docker network
      INTERNAL_API_URL: http://backend-go:4000
      
      # Analytics Configuration
      NEXT_PUBLIC_GA_MEASUREMENT_ID: ${NEXT_PUBLIC_GA_MEASUREMENT_ID:-}
      
      # Feature Flags
      NEXT_PUBLIC_ENABLE_PWA: ${NEXT_PUBLIC_ENABLE_PWA:-true}
      
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    volumes:
      # Mount entire frontend folder for hot-reload in development
      - ./frontend:/app
      # Named volumes override node_modules and .next to avoid Windows/Linux binary conflicts
      - frontend_node_modules:/app/node_modules
      - frontend_next:/app/.next
    depends_on:
      - backend-go
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:3000"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - price-comparison-network

  # Go Backend (replaces Node.js backend)
  backend-go:
    build:
      context: ./backend-go
      dockerfile: Dockerfile
    container_name: price-comparison-backend-go
    restart: unless-stopped
    environment:
      NODE_ENV: ${NODE_ENV:-development}
      PORT: ${BACKEND_PORT:-4000}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: ${POSTGRES_DB:-price_comparison}
      DB_USER: ${POSTGRES_USER:-pricecompare}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-pricecompare_dev_password}
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: ${JWT_SECRET:-dev_jwt_secret_change_in_production}
      JWT_REFRESH_SECRET: ${JWT_REFRESH_SECRET:-dev_jwt_refresh_secret_change_in_production}
      JWT_EXPIRES_IN: ${JWT_EXPIRES_IN:-24h}
      JWT_REFRESH_EXPIRES_IN: ${JWT_REFRESH_EXPIRES_IN:-168h}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      CLAUDE_API_KEY: ${CLAUDE_API_KEY:-}
      TIKI_API_KEY: ${TIKI_API_KEY:-}
      LAZADA_API_KEY: ${LAZADA_API_KEY:-}
      LAZADA_API_SECRET: ${LAZADA_API_SECRET:-}
      TIKTOK_SHOP_API_KEY: ${TIKTOK_SHOP_API_KEY:-}
      RATE_LIMIT_WINDOW_MS: ${RATE_LIMIT_WINDOW_MS:-60000}
      RATE_LIMIT_MAX_REQUESTS: ${RATE_LIMIT_MAX_REQUESTS:-200}
      AUTH_RATE_LIMIT_WINDOW_MS: ${AUTH_RATE_LIMIT_WINDOW_MS:-60000}
      AUTH_RATE_LIMIT_MAX_REQUESTS: ${AUTH_RATE_LIMIT_MAX_REQUESTS:-30}
      SEARCH_RATE_LIMIT_WINDOW_MS: ${SEARCH_RATE_LIMIT_WINDOW_MS:-60000}
      SEARCH_RATE_LIMIT_MAX_REQUESTS: ${SEARCH_RATE_LIMIT_MAX_REQUESTS:-120}
      DATA_COLLECTION_SCHEDULER_ENABLED: ${DATA_COLLECTION_SCHEDULER_ENABLED:-true}
      COLLECTION_SCHEDULE_CRON: ${COLLECTION_SCHEDULE_CRON:-0 */6 * * *}
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:4000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - price-comparison-network

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local
  backend_node_modules:
    driver: local
  frontend_node_modules:
    driver: local
  frontend_next:
    driver: local

networks:
  price-comparison-network:
    driver: bridge
