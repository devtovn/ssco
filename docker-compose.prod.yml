services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB:-price_comparison}
    volumes:
      - postgres_prod_data:/var/lib/postgresql/data
    networks:
      - ssco-prod

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --maxmemory 512mb --maxmemory-policy allkeys-lru --appendonly yes
    volumes:
      - redis_prod_data:/data
    networks:
      - ssco-prod

  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: runner
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      DB_HOST: postgres
      REDIS_HOST: redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${BACKEND_PORT:-4000}:4000"
    networks:
      - ssco-prod

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: runner
    restart: unless-stopped
    env_file: .env
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    depends_on:
      - backend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    networks:
      - ssco-prod

volumes:
  postgres_prod_data:
  redis_prod_data:

networks:
  ssco-prod:
    driver: bridge
